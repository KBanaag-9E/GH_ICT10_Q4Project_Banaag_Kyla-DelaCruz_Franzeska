<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- PYSCRIPT -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <!-- !-- SETUP BOOTSTAP: link to Bootstrap -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- ADDITIONAL TAG FOR NUMPY & MATPLOTLIB -->
    <py-config>
        packages = ['numpy', 'matplotlib']
    </py-config>

    <title>Skills Test 4Q</title>

    
    <style>
    body {
        padding: 20px;
        background-image: url(ya.jpg);
        background-size: cover;
        font-family: monospace;
    }

    .header {
        padding: 20px;
        background: rgb(117, 36, 50);
        color: beige;
        border-radius: 8px;
        box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;
    }
    .container {
            padding: 20px;
            background-color: beige;
            border-radius: 8px;
            box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;
        }
    
    .container2 {
            padding: 20px;
            background-color: beige;
            border-radius: 8px;
            box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;
        }

    .container3 {
            padding: 20px;
            background-color: rgb(117, 36, 50);
            border-radius: 8px;
            box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;
        }

    a {
        text-decoration: none;
        color: rgb(117, 36, 50);
    }

    .tracker-card { 
            background-color:  rgb(117, 36, 50); 
            border-radius: 22px; 
            color: beige;
    }
    .graph-card { 
            border-radius: 0;
            background-color:  rgb(117, 36, 50); 
            padding: 22px; 
    }

    </style>

</head>
<body>

<!-- HEADER -->
<div class="container mt-4">
        <div class="row justify-content-center align-items-center g-4">

            <div class="col-md-5">
                <div class="card shadow p-4 tracker-card">
                    <h2 class="text-center fw-bold" style="color: beige;">Attendance Tracker</h2>
                    <div class="mt-4">
                        <label class="fw-bold" style="color: beige;">Select Day</label>
                        <select id="day" class="form-select mb-3">
                            <option value="0">Monday</option>
                            <option value="1">Tuesday</option>
                            <option value="2">Wednesday</option>
                            <option value="3">Thursday</option>
                            <option value="4">Friday</option>
                        </select>

                        <label class="fw-bold" style="color: beige;">Absences</label>
                        <input type="number" id="absence" class="form-control mb-4" placeholder="0">

                        <!-- BUTTON -->
                    
                        <input class="form-control" type="button" py-click="update_tracker" value="Submit">
                    </div>
                </div>
            </div>

            <!-- OUTPUT -->
            <div class="col-md-7">
                <div class="card graph-card shadow">
                    <div id="output"></div>
                </div>
            </div>

        </div>
    </div>

<py-script src="tracker.py"></py-script>

    <!-- FOOTER -->
    <center>
	<footer class="mt-5 mb-5 text-secondary"><b>© 2025 Franzeska Dela Cruz & Kyla Banaag | 10-E<br>
	</center>


</body>

</html>
