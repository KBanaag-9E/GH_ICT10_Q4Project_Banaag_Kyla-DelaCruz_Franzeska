<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Recommended meta tags -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">

        <!-- PyScript CSS -->
        <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
        <!-- This script tag bootstraps PyScript -->
        <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
        <!-- Bootstrap Setup -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <!-- External CSS -->
        <link rel="stylesheet" type="text/css" href="style.css">

        <py-config>
            packages = ["pandas"]
        </py-config>

        <title>Grade 10-Emerald A.Y. 25-26</title>

        <style>
            div {
                color:black;
            }

            th {
                min-width: 50px;
            }

            table {
                font-family: 'Courier New', Courier, monospace;
            }

            #header {
                margin-left: 5vw;
            }

            .container {
                margin-left: 5vw;
            }

            #pandas-output {
                margin-left: 5vw;
            }
        </style>

    </head>
    <body>
        <py-script src="main.py"></py-script>

        <!-- navbar -->
        <nav class="navbar navbar-expand-sm bg-dark navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand">10-Emerald Greenhills A.Y. 25-26</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar"></button>

            <div class="d-flex" id="mynavbar">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item active">
                        <a class="nav-link active" href="index.html">Class List</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="attendance.html">Attendance</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="memories.html">Memories</a>
                    </li>
                </ul>
            </div>
        </div>
        </nav>

        <h2 class="mt-2 text-center">10-Emerald Class List</h2>

            <!-- FORM -->
            <div class="container mt-3" style="padding: 10px;">
                <form>

                    <!-- Name -->
                    <input class="form-control"  type="text" id="name" name="name" placeholder="Enter name" required> <br>

                    <!-- Nickname -->
                    <input class="form-control"  type="text" id="nickname" name="nickname" placeholder="Enter nickname" required> <br>

                    <!-- Section -->
                    <input class="form-control"  type="text" id="section" name="section" placeholder="Enter section" required> <br>

                    <!-- Birthday -->
                    <input class="form-control"  type="text" id="bday" name="bday" placeholder="Enter birthday" required> <br>

                    <!-- Interest -->
                    <input class="form-control"  type="text" id="interest" name="interest" placeholder="Enter interest" required> <br>

                    <!-- Favorite Subject -->
                    <input class="form-control"  type="text" id="subject" name="subject" placeholder="Enter favorite subject"  required> <br>

                    <!-- BUTTONS -->
                    <div class="d-flex gap-2">
                        <input class="btn btn-primary" type="button" py-click="add_classmate" value="Add Classmate">
                        <input class="btn btn-secondary" type="button" py-click="class_list" value="Display Class List">
                    </div>
                </form>
            </div>

        <center>
            <div id="output" class="mt-3"></div>
        </center>

    </body>
</html>
