<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Recommended meta tags -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">

        <!-- PyScript CSS -->
        <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
        <!-- This script tag bootstraps PyScript -->
        <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
        <!-- Bootstrap Setup -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <!-- External CSS -->
        <link rel="stylesheet" type="text/css" href="style.css">

        <title></title>

    </head>
    <body>
        <py-script src="main.py"></py-script>

        <h2 class="mt-2">Grade 10-Emerald A.Y. 25-26 Class List</h2>

            <!-- FORM -->
            <div class="container mt-3" style="padding: 10px;">
                <form>

                    <!-- Name -->
                    <input class="form-control"  type="text" id="name" name="name" placeholder="Enter name" required> <br>

                    <!-- Nickname -->
                    <input class="form-control"  type="text" id="nickname" name="nickname" placeholder="Enter nickname" required> <br>

                    <!-- Section -->
                    <input class="form-control"  type="text" id="section" name="section" placeholder="Enter section" required> <br>

                    <!-- Birthday -->
                    <input class="form-control"  type="text" id="bday" name="bday" placeholder="Enter birthday" required> <br>

                    <!-- Interest -->
                    <input class="form-control"  type="text" id="interest" name="interest" placeholder="Enter interest" required> <br>

                    <!-- Favorite Subject -->
                    <input class="form-control"  type="text" id="subject" name="subject" placeholder="Enter favorite subject"  required> <br>

                    <!-- BUTTONS -->
                    <div class="d-flex gap-2">
                        <input class="btn btn-primary" type="button" py-click="add_classmate" value="Add Classmate">
                        <input class="btn btn-secondary" type="button" py-click="class_list" value="Display Class List">
                    </div>
                </form>
            </div>

        <div id="output"></div>
    </body>
</html>
