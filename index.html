<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Recommended meta tags -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">

        <!-- PyScript CSS -->
        <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
        <!-- This script tag bootstraps PyScript -->
        <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
        <!-- Bootstrap Setup -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <!-- External CSS -->
        <link rel="stylesheet" type="text/css" href="style.css">

        <py-config>
            packages = ["pandas"]
        </py-config>

        <title>Grade 10-Emerald A.Y. 25-26</title>

        <style>
            body {
                background-color: #C9E4CA;
                font-family: monospace;
            }

            .container {
                padding: 20px;
                background-color: #87BBA2;
                border-radius: 8px;
                box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;
            }

            .tracker-card {
                background-color: #3B6064;
                border-radius: 22px;
                color: beige;
            }

            .graph-card {
                border-radius: 0;
                background-color: #3B6064;
                padding: 22px;
            }

            .tracker-card label,
            .tracker-card input,
            .tracker-card .btn {
                color: beige;
            }

            .tracker-card .form-control,
            .tracker-card .btn {
                background-color: rgba(255,255,255,0.95);
            }

            .tracker-card .btn-primary {
                background-color: #6dab82;
                border-color: #6dab82;
            }

            .tracker-card .btn-secondary {
                background-color: #87bba2;
                border-color: #87bba2;
            }
        </style>

    </head>
    <body>
        <py-script src="main.py"></py-script>

        <!-- navbar -->
        <nav class="navbar navbar-expand-sm bg-dark navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand">10-Emerald Greenhills A.Y. 25-26</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar"></button>

            <div class="d-flex" id="mynavbar">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item active">
                        <a class="nav-link active" href="index.html">Class List</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="attendance.html">Attendance</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="memories.html">Memories</a>
                    </li>
                </ul>
            </div>
        </div>
        </nav>

        <div class="container mt-3">
            <div class="row justify-content-center align-items-start g-4">
                <div class="col-md-5">
                    <div class="card shadow p-4 tracker-card">
                    <h2 class="text-center fw-bold" style="color: beige;">10-Emerald Class List</h2>
                        <form class="mt-2">
                            <!-- Name -->
                            <label class="fw-bold" style="color: beige;">Name</label>
                            <input class="form-control mb-3" type="text" id="name" name="name" placeholder="Enter name" required>
                            <!-- Nickname -->
                            <label class="fw-bold" style="color: beige;">Nickname</label>
                            <input class="form-control mb-3" type="text" id="nickname" name="nickname" placeholder="Enter nickname" required>
                            <!-- Section -->
                            <label class="fw-bold" style="color: beige;">Section</label>
                            <input class="form-control mb-3" type="text" id="section" name="section" placeholder="Enter section" required>
                            <!-- Birthday -->
                            <label class="fw-bold" style="color: beige;">Birthday</label>
                            <input class="form-control mb-3" type="text" id="bday" name="bday" placeholder="Enter birthday" required>
                            <!-- Interest -->
                            <label class="fw-bold" style="color: beige;">Interest</label>
                            <input class="form-control mb-3" type="text" id="interest" name="interest" placeholder="Enter interest" required>
                            <!-- Favorite Subject -->
                            <label class="fw-bold" style="color: beige;">Favorite Subject</label>
                            <input class="form-control mb-4" type="text" id="subject" name="subject" placeholder="Enter favorite subject" required>
                            <!-- Buttons -->
                            <div class="d-flex gap-2">
                                <input class="btn btn-primary w-100" type="button" py-click="add_classmate" value="Add Classmate">
                                <input class="btn btn-secondary w-100" type="button" py-click="class_list" value="Display Class List">
                            </div>
                        </form>
                    </div>
                </div>
                <div class="col-md-7">
                    <div class="card graph-card shadow">
                        <div id="output"></div>
                    </div>
                </div>
            </div>
        </div>


    </body>
</html>
